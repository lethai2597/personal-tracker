services:
  postgres:
    image: postgres:17-alpine
    container_name: personal-tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d personal_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
